events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # --- upstream ---
    upstream auth_service {
        server auth-service:8001;
    }

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;

        # --- auth endpoints (no auth check) ---
        location /auth/ {
            proxy_pass         http://auth_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- internal validate sub-request (never exposed externally) ---
        location = /internal/auth/validate {
            internal;
            proxy_pass         http://auth_service/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header   Content-Length    "";
            proxy_set_header   X-Original-URI    $request_uri;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Cookie            $http_cookie;
            proxy_set_header   Authorization     $http_authorization;
        }

        # --- api endpoints (require auth) ---
        location /api/ {
            auth_request /internal/auth/validate;

            # pass user info from validate response headers to backend
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header   X-User-Id         $user_id;
            proxy_set_header   X-User-Role       $user_role;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_pass         http://backend;

            # return 401 when validate fails
            error_page 401 = @unauthorized;
            error_page 403 = @forbidden;
        }

        location @unauthorized {
            default_type application/json;
            return 401 '{"detail": "Не авторизован"}';
        }

        location @forbidden {
            default_type application/json;
            return 403 '{"detail": "Доступ запрещён"}';
        }

        # --- health check endpoints (no auth) ---
        location /health {
            proxy_pass         http://backend/health;
            proxy_set_header   Host $host;
        }

        location /auth-health {
            proxy_pass         http://auth_service/health;
            proxy_set_header   Host $host;
        }

        # --- frontend (catch-all) ---
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
