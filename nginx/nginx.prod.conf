events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    upstream auth_service {
        server auth-service:8001;
    }

    upstream backend {
        server backend:8000;
    }

    # HTTP → HTTPS + certbot
    server {
        listen 80;
        server_name acc.404.mn;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name acc.404.mn;

        ssl_certificate     /etc/letsencrypt/live/acc.404.mn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/acc.404.mn/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 20m;

        # --- auth endpoints (без проверки токена) ---
        location /auth/ {
            proxy_pass         http://auth_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- внутренний validate (только для auth_request) ---
        location = /internal/auth/validate {
            internal;
            proxy_pass         http://auth_service/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header   Content-Length    "";
            proxy_set_header   X-Original-URI    $request_uri;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Cookie            $http_cookie;
            proxy_set_header   Authorization     $http_authorization;
        }

        # --- api (требует авторизации) ---
        location /api/ {
            auth_request /internal/auth/validate;

            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header   X-User-Id         $user_id;
            proxy_set_header   X-User-Role       $user_role;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_pass         http://backend;

            error_page 401 = @unauthorized;
            error_page 403 = @forbidden;
        }

        location @unauthorized {
            default_type application/json;
            return 401 '{"detail": "Не авторизован"}';
        }

        location @forbidden {
            default_type application/json;
            return 403 '{"detail": "Доступ запрещён"}';
        }

        # --- health ---
        location = /health {
            proxy_pass       http://backend/health;
            proxy_set_header Host $host;
        }

        location = /auth-health {
            proxy_pass       http://auth_service/health;
            proxy_set_header Host $host;
        }

        # --- frontend (статика) ---
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
