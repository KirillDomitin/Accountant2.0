events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;  # не светить версию nginx

    # Rate limiting: 10 req/s для api, 3 req/s для auth
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

    upstream auth_service {
        server auth-service:8001;
    }

    upstream backend {
        server backend:8000;
    }

    # HTTP → HTTPS + certbot
    server {
        listen 80;
        server_name acc.404.mn;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name acc.404.mn;

        ssl_certificate     /etc/letsencrypt/live/acc.404.mn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/acc.404.mn/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 20m;

        # --- Security headers ---
        add_header X-Frame-Options           "DENY"              always;
        add_header X-Content-Type-Options    "nosniff"           always;
        add_header X-XSS-Protection          "1; mode=block"     always;
        add_header Referrer-Policy           "strict-origin"     always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

        # --- Блок dotfiles (.env, .git, .htaccess и т.д.) ---
        location ~ /\. {
            deny all;
            return 404;
        }

        # --- Блок чувствительных файлов ---
        location ~* \.(env|log|sql|bak|sh|key|pem|crt|conf|cfg|ini|toml|yaml|yml|json)$ {
            deny all;
            return 404;
        }

        # --- Блок типичных сканирований и разведки ---
        location ~* ^/(wp-admin|wp-login|phpmyadmin|adminer|phpinfo|\.git|\.svn|\.env|docker-compose|Dockerfile|Makefile|README) {
            deny all;
            return 404;
        }

        # --- auth endpoints (rate limit, без проверки токена) ---
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://auth_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- внутренний validate (только для auth_request) ---
        location = /internal/auth/validate {
            internal;
            proxy_pass         http://auth_service/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header   Content-Length    "";
            proxy_set_header   X-Original-URI    $request_uri;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Cookie            $http_cookie;
            proxy_set_header   Authorization     $http_authorization;
        }

        # --- api (rate limit + auth_request) ---
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            auth_request /internal/auth/validate;

            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header   X-User-Id         $user_id;
            proxy_set_header   X-User-Role       $user_role;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_pass         http://backend;

            error_page 401 = @unauthorized;
            error_page 403 = @forbidden;
        }

        location @unauthorized {
            default_type application/json;
            return 401 '{"detail": "Не авторизован"}';
        }

        location @forbidden {
            default_type application/json;
            return 403 '{"detail": "Доступ запрещён"}';
        }

        # --- health (без rate limit, без auth) ---
        location = /health {
            proxy_pass       http://backend/health;
            proxy_set_header Host $host;
        }

        location = /auth-health {
            proxy_pass       http://auth_service/health;
            proxy_set_header Host $host;
        }

        # --- frontend (статика) ---
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # кешировать статику (js/css/img), не кешировать html
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
